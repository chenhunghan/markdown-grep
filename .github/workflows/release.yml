name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4.4.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    name: Build ${{ matrix.artifact }}
    needs: release-please
    if: needs.release-please.outputs.release_created
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-arm64
            artifact: mdg-darwin-arm64
            archive: tar.gz
          - target: bun-darwin-x64
            artifact: mdg-darwin-x64
            archive: tar.gz
          - target: bun-linux-arm64
            artifact: mdg-linux-arm64
            archive: tar.gz
          - target: bun-linux-x64
            artifact: mdg-linux-x64
            archive: tar.gz
          - target: bun-windows-x64
            artifact: mdg-windows-x64
            archive: zip
          - target: bun-windows-arm64
            artifact: mdg-windows-arm64
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Build binary
        run: |
          bun build src/cli/index.ts --compile --minify \
            --target=${{ matrix.target }} \
            --outfile mdg \
            --external node-llama-cpp \
            --external sqlite-vec \
            --external @node-llama-cpp/mac-x64 \
            --external @node-llama-cpp/linux-x64-cuda \
            --external @node-llama-cpp/linux-x64-cuda-ext \
            --external @node-llama-cpp/linux-x64-vulkan \
            --external @node-llama-cpp/linux-x64 \
            --external @node-llama-cpp/linux-arm64 \
            --external @node-llama-cpp/linux-armv7l \
            --external @node-llama-cpp/win-x64-cuda \
            --external @node-llama-cpp/win-x64-cuda-ext \
            --external @node-llama-cpp/win-x64-vulkan \
            --external @node-llama-cpp/win-x64 \
            --external @node-llama-cpp/win-arm64

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: tar -czf ${{ matrix.artifact }}.tar.gz mdg

      - name: Package (zip)
        if: matrix.archive == 'zip'
        run: zip ${{ matrix.artifact }}.zip mdg.exe

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ matrix.archive }}" = "tar.gz" ]; then
            gh release upload ${{ needs.release-please.outputs.tag_name }} ${{ matrix.artifact }}.tar.gz
          else
            gh release upload ${{ needs.release-please.outputs.tag_name }} ${{ matrix.artifact }}.zip
          fi

  checksums:
    name: Generate checksums
    needs: [release-please, build]
    if: needs.release-please.outputs.release_created
    runs-on: ubuntu-latest
    steps:
      - name: Download all release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release download ${{ needs.release-please.outputs.tag_name }} --dir assets/

      - name: Generate SHA256 checksums
        working-directory: assets
        run: sha256sum * > checksums.txt

      - name: Upload checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} assets/checksums.txt
